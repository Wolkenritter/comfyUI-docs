<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- 主渐变 -->
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="50%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#4F46E5"/>
    </linearGradient>
    <!-- 光晕效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- 阴影 -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4338CA" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="200" height="200" rx="40" fill="url(#mainGrad)" filter="url(#shadow)"/>

  <!-- 内圈装饰 -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="white" stroke-width="1" stroke-opacity="0.1"/>

  <!-- 大号 C 字母 -->
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="140" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">C</text>

  <!-- 节点装饰群 -->
  <!-- 右上角节点组 -->
  <circle cx="155" cy="45" r="10" fill="white" fill-opacity="0.95"/>
  <circle cx="170" cy="65" r="7" fill="white" fill-opacity="0.8"/>
  <circle cx="160" cy="85" r="6" fill="white" fill-opacity="0.7"/>
  <circle cx="175" cy="95" r="4" fill="white" fill-opacity="0.5"/>

  <!-- 左下角节点组 -->
  <circle cx="45" cy="155" r="8" fill="white" fill-opacity="0.85"/>
  <circle cx="30" cy="135" r="5" fill="white" fill-opacity="0.6"/>
  <circle cx="55" cy="125" r="4" fill="white" fill-opacity="0.5"/>

  <!-- 连接线 - 右上 -->
  <line x1="155" y1="45" x2="140" y2="38" stroke="white" stroke-width="3" stroke-opacity="0.7"/>
  <line x1="170" y1="65" x2="150" y2="60" stroke="white" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="160" y1="85" x2="145" y2="80" stroke="white" stroke-width="2" stroke-opacity="0.5"/>

  <!-- 连接线 - 左下 -->
  <line x1="45" y1="155" x2="40" y2="140" stroke="white" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="55" y1="125" x2="50" y2="110" stroke="white" stroke-width="2" stroke-opacity="0.5"/>

  <!-- 顶部高光 -->
  <ellipse cx="100" cy="25" rx="60" ry="8" fill="white" fill-opacity="0.15"/>

  <!-- 底部装饰点 -->
  <circle cx="85" cy="175" r="3" fill="white" fill-opacity="0.4"/>
  <circle cx="100" cy="180" r="4" fill="white" fill-opacity="0.5"/>
  <circle cx="115" cy="175" r="3" fill="white" fill-opacity="0.4"/>
</svg>