<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#mainGrad)"/>
  <!-- Big C letter -->
  <text x="50" y="72" font-family="Arial, sans-serif" font-size="70" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">C</text>
  <!-- Decorative dots (nodes) -->
  <circle cx="72" cy="30" r="5" fill="white" fill-opacity="0.9"/>
  <circle cx="78" cy="42" r="3" fill="white" fill-opacity="0.7"/>
  <circle cx="75" cy="55" r="4" fill="white" fill-opacity="0.8"/>
  <!-- Connection lines -->
  <line x1="72" y1="30" x2="62" y2="25" stroke="white" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="78" y1="42" x2="68" y2="40" stroke="white" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="75" y1="55" x2="65" y2="58" stroke="white" stroke-width="2" stroke-opacity="0.6"/>
</svg>